services:
  mihomo-pool:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mihomo-pool
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 3320
      DATA_DIR: /data
      WEB_DIR: /app/web/public
      # 用于“首次启动”初始化导出 Host（之后会持久化到 SQLite，并可在「设置」里修改）
      PROXY_HOST: ${PROXY_HOST:-127.0.0.1}
    volumes:
      - ./data:/data
    ports:
      # 管理后台
      - "3320:3320"
      # 代理端口（mixed-port）默认从 30001 开始分配；按需调整暴露范围
      - "30001-30100:30001-30100"
