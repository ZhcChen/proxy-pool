services:
  mihomo-pool:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mihomo-pool
    restart: unless-stopped
    # Linux 推荐：使用 host 网络，避免端口映射/转发链路导致外部无法访问代理端口
    # 注意：host 模式会直接占用宿主机端口（如 3320、以及你创建的 mixed-port 范围）
    network_mode: host
    environment:
      HOST: 0.0.0.0
      PORT: 3320
      DATA_DIR: /data
      WEB_DIR: /app/web/public
      # 用于“首次启动”初始化导出 Host（之后会持久化到 SQLite，并可在「设置」里修改）
      PROXY_HOST: ${PROXY_HOST:-127.0.0.1}
    volumes:
      - ./data:/data
